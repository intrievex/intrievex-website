     <style>
    
     /*General*/
     table {margin: 0 auto 0;}
     body {font-family: Arial, sans-serif; font-size: 12px;}
     #container {border: 3px solid #234d78; width: 520px; padding: 20px 10px 20px; background-color: #c8d2dd; margin: 30px auto 0; }  

     /*headers*/
     td.title {font-size: 18px; font-weight: bold; color: #234d78;}
     td.subtitle {font-size: 14px;font-weight: bold;color: #234d78; background-color: #F5F5F5;}
     #container td.field_label {font-size: 14px;font-weight: normal; color: #000000; width: 120px;}
     div.multicard_header {font-size: 18px; font-weight: bold; color: #234d78;}
     div.multicard_subheader {font-size: 14px; font-weight: bold; color: #234d78; padding: 5px 0 5px 5px;}
     div.multicard_data {font-size: 14px; text-align: center;color: #000000; padding: 0 10px 0;}
     .pg-normal {font-size: 14px;font-weight: normal; text-decoration: none; color: #000000;}
     .pg-selected {font-size: 14px; font-weight: bold; text-decoration: underline; color: #000000;}
      
     /* Buttons*/ 
     input.fields {width: 170px;}
     input.checkbox { margin: 5px 20px 5px 112px;}
     select {width: 175px;}
     #trnExpMonth {width: 40px; }
     #trnExpYear {width: 55px;}
     .trnCardCvd_box, #trnCardCvd_box {width: 35px;}
     textarea#profileComments {width: 436px; height: 120px;}
     #btnCustomerSubmit, #btnCustomerCancel {width: 100px; margin: 20px 20px 5px;}
     #btnClose, #btnSubmit, #btnDelete {margin-right: 10px;}
     #btnAddCard {font-size: 11px; width: 98px; margin-left: 10px; position: relative; right: 164px;}

     /*Credit Card Table*/
     #ccInfoTitle {position: relative; right: 116px;}
     #ccInfoTable {width: 436px; background-color: #ffffff; border: 1px solid #234d78; border-collapse: collapse;}
     #ccInfoTable thead  {background-color: #e5eaef; border: 1px solid #234d78;}
     #ccInfoTable tr td {padding: 5px;}

     /*Trans. History Table*/
     table.trnHistoryTable {width:650; border:2px solid grey;}
